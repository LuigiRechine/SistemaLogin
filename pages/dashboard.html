<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
<nav class="navbar navbar-dark bg-dark py-2">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <span class="navbar-brand mb-0 h1 fs-5 ms-2">Meu Sistema</span>

    <div class="d-flex align-items-center">
      <div id="iniciais" class="bg-info text-white d-flex align-items-center justify-content-center fw-bold" style="width: 50px; height: 50px; border-radius: 4px;">
        --
      </div>
      <div class="ms-3 me-3 text-white">
        <p id="nomeNav" class="mb-0 fw-bold" style="line-height: 1;">Nome</p>
        <small id="papelNav" class="text-info">Papel</small>
      </div>
      <button id="btnSair" class="btn btn-outline-light btn-sm">Sair</button>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="card border-0 shadow-sm p-4 border-start border-primary border-5">
    <h2 id="mensagemBoasVindas" class="text-primary fw-bold">Seja bem-vindo(a)!</h2>
    <p class="text-secondary mb-0">
        Este é o seu painel de controle. Você está logado no sistema com privilégios de <strong id="papelCard">...</strong>.
    </p>
  </div>
</div>
<script src="../js/dashboard.js"></script>
</body>
</html>
